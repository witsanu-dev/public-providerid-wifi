<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Authentication | โรงพยาบาลกมลาไสย</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            margin: auto;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }

        .moph-logo {
            width: 80px;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <img src="https://provider.id.th/assets/logoMOPH-bd11cdfe.png" alt="MOPH Logo" class="moph-logo">
                <h4 class="fw-bold text-success">WiFi Authentication</h4>
                <p class="text-muted small">โรงพยาบาลกมลาไสย จังหวัดกาฬสินธุ์</p>
            </div>

            <!-- FortiGate Login -->
            <form action="%%AUTH_POST_URL%%" method="post">
                <input type="hidden" name="%%REDIRID%%" value="%%PROTURI%%">
                <input type="hidden" name="%%MAGICID%%" value="%%MAGICVAL%%">
                <input type="hidden" name="%%METHODID%%" value="%%METHODVAL%%">

                <div class="mb-3">
                    <label class="form-label small fw-bold">ชื่อผู้ใช้งาน</label>
                    <input type="text" id="ft_un" name="%%USERNAMEID%%" class="form-control" placeholder="Username"
                        required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">รหัสผ่าน</label>
                    <input type="password" name="%%PASSWORDID%%" class="form-control" placeholder="Password" required
                        autocomplete="off">
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold">เข้าใช้งานอินเทอร์เน็ต</button>
            </form>

            <div class="text-center my-3 text-muted small">หรือเชื่อมต่อผ่าน</div>

            <!-- Provider ID -->
            <form action="https://moph.id.th/oauth/redirect" method="get">
                <input type="hidden" name="client_id" value="[CLIENT_ID]">
                <input type="hidden" name="redirect_uri" value="https://[IP_ADDRESS]/oauth/providerid_authen.php">
                <input type="hidden" name="response_type" value="code">
                <input type="hidden" name="state"
                    value="auth_posturl=%%AUTH_POST_URL%%&auth_redirid=%%PROTURI%%&auth_magicid=%%MAGICVAL%%&auth_methodid=%%METHODVAL%%">

                <button type="submit"
                    class="btn btn-outline-secondary w-100 fw-bold d-flex align-items-center justify-content-center gap-2">
                    <img src="https://provider.id.th/assets/Plogo-f6506bc1.png" height="24" alt="Provider ID">
                    เข้าสู่ระบบด้วย Provider ID
                </button>
            </form>

            <footer class="mt-4 pt-3 border-top text-center text-muted">
                <p class="small mb-1 fw-bold text-dark">กลุ่มงานสุขภาพดิจิทัล โรงพยาบาลกมลาไสย</p>
                <p class="small mb-2">แจ้งปัญหา: <a href="tel:043899570" class="text-decoration-none">043 899 570 ต่อ
                        292</a></p>
                <div class="bg-light p-2 rounded small" style="font-size: 0.65rem;">
                    ระบบมีการจัดเก็บ Log file ตาม พ.ร.บ. คอมพิวเตอร์ พ.ศ. 2560
                </div>
            </footer>
        </div>
    </div>

    <script>
        (function () {
            try {
                const usernameInput = document.getElementById('ft_un');
                const stateInput = document.querySelector('input[name="state"]');
                function updateState() {
                    if (!stateInput) return;
                    let parts = stateInput.value.split('&').filter(p => !p.startsWith('user_value='));
                    for (let i = 0; i < parts.length; i++) {
                        if (parts[i].startsWith('auth_posturl=')) {
                            let urlValue = parts[i].substring(13);
                            if (urlValue.startsWith('/')) {
                                parts[i] = 'auth_posturl=' + window.location.origin + urlValue;
                            }
                        }
                    }
                    if (usernameInput && usernameInput.value) {
                        parts.push('user_value=' + encodeURIComponent(usernameInput.value));
                    }
                    stateInput.value = parts.join('&');
                }
                if (usernameInput) usernameInput.addEventListener('input', updateState);
                updateState();
            } catch (e) { console.error(e); }
        })();
    </script>
</body>

</html>
